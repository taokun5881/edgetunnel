name: Sync upstream

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-upstream-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: main
      UPSTREAM_REPO: cmliu/edgetunnel
      UPSTREAM_BRANCH: main
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Fetch upstream
        run: |
          git remote add upstream "https://github.com/${UPSTREAM_REPO}.git" || git remote set-url upstream "https://github.com/${UPSTREAM_REPO}.git"
          git fetch upstream "${UPSTREAM_BRANCH}" --prune
      - name: Merge upstream and keep local workflows
        shell: bash
        run: |
          set -euo pipefail
          backup_dir="$RUNNER_TEMP/local-workflows"
          mkdir -p "$backup_dir"
          if [ -d .github/workflows ]; then cp -a .github/workflows/. "$backup_dir/"; fi
          git merge --no-edit "upstream/${UPSTREAM_BRANCH}"
          rm -rf .github/workflows
          mkdir -p .github/workflows
          if [ -d "$backup_dir" ]; then cp -a "$backup_dir/." .github/workflows/; fi
          git add -A .github/workflows
          if ! git diff --cached --quiet; then git commit -m "ci: keep local workflows after upstream sync"; fi
      - name: Push changes
        run: git push origin "HEAD:${TARGET_BRANCH}"
      - name: Sync tags
        run: git push --tags origin
